<style>
  :root{
    --bg:#141110; --bg-2:#1E1917; --panel:#221C19;
    --cream:#F4EFE6; --muted:#B7AB9B; --gold:#C9A24B; --red:#C4453B; --line:#3A312B;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--cream);font-family:'Inter',sans-serif;line-height:1.6}
  .wrap{max-width:860px;margin:0 auto;padding-bottom:60px}

  /* Masthead */
  .brand{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 26px;border-bottom:1px solid var(--line);
    letter-spacing:.3em;font-size:12px;font-weight:600;text-transform:uppercase;
    position:sticky;top:0;background:var(--bg);z-index:5;
  }
  .brand .tag{color:var(--gold)}

  .hero{padding:38px 26px 10px;text-align:center}
  .hero .eyebrow{font-size:12px;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:14px}
  .hero h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:66px;line-height:.95}
  .hero .sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:var(--muted);margin-top:4px}

  /* Language selector */
  .langs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:22px 26px 6px}
  .langbtn{
    font-family:'Inter',sans-serif;font-size:13px;font-weight:500;
    background:var(--bg-2);color:var(--muted);border:1px solid var(--line);
    padding:9px 15px;border-radius:999px;cursor:pointer;transition:.15s;
  }
  .langbtn:hover{color:var(--cream)}
  .langbtn.active{background:var(--gold);color:#141110;border-color:var(--gold);font-weight:600}

  .intro{text-align:center;color:var(--muted);font-size:14px;padding:6px 26px 4px}
  .total{text-align:center;color:var(--gold);font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;padding:14px 26px 0}

  .stops{padding:22px 26px 0}
  .stop{
    background:var(--panel);border:1px solid var(--line);border-radius:6px;
    padding:20px 20px 18px;margin-bottom:16px;
  }
  .stop .top{display:flex;align-items:flex-start;gap:16px}
  .num{
    flex-shrink:0;width:42px;height:42px;border-radius:50%;
    background:transparent;border:1.5px solid var(--gold);color:var(--gold);
    display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;
  }
  .stop .head{flex:1;min-width:0}
  .stop .row1{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .stop h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:26px;line-height:1.05}
  .time{
    font-size:11.5px;font-weight:600;letter-spacing:.06em;color:var(--gold);
    border:1px solid var(--line);border-radius:999px;padding:3px 10px;white-space:nowrap;
  }
  .stop .todo{color:#E5DCCE;font-size:14px;margin-top:7px}

  .audio{margin-top:15px;padding-left:58px}
  .audio audio{width:100%;height:38px;border-radius:8px}
  .noaudio{
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    color:var(--muted);font-size:13px;font-style:italic;
  }
  .upload{
    font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;
    background:transparent;color:var(--gold);border:1px solid var(--gold);
    padding:8px 14px;border-radius:6px;cursor:pointer;
  }
  .upload:hover{background:var(--gold);color:#141110}

  footer{text-align:center;padding:34px 24px 10px;border-top:1px solid var(--line);margin:22px 26px 0}
  footer .fname{letter-spacing:.32em;font-size:12px;font-weight:600;text-transform:uppercase;color:var(--gold)}
  footer .wish{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:20px;margin-top:6px}
  .note{max-width:600px;margin:20px auto 0;color:var(--cream);font-size:17px;text-align:center;padding:0 26px;line-height:1.6;font-family:'Cormorant Garamond',serif;font-style:italic}
  .copyright{text-align:center;color:#7C7264;font-size:11px;letter-spacing:.18em;padding:26px 26px 8px}

  @media (max-width:560px){
    .hero h1{font-size:48px}
    .audio{padding-left:0}
    .num{width:36px;height:36px;font-size:20px}
  }
</style>

function render(){
  const d=T[lang];
  document.documentElement.lang=lang;
  document.getElementById("eyebrow").textContent=d.eyebrow;
  document.getElementById("subtitle").textContent=d.sub;
  document.getElementById("intro").textContent=d.intro;
  document.getElementById("wish").textContent=d.wish;
  document.getElementById("note").textContent=NOTE;

  // language buttons
  const lc=document.getElementById("langs");
  lc.innerHTML="";
  LANGS.forEach(([code,label])=>{
    const b=document.createElement("button");
    b.className="langbtn"+(code===lang?" active":"");
    b.textContent=label;
    b.onclick=()=>{lang=code;render();};
    lc.appendChild(b);
  });

  // stops
  const sc=document.getElementById("stops");
  sc.innerHTML="";
  d.stops.forEach((st,i)=>{
    const card=document.createElement("div");
    card.className="stop";

    const top=document.createElement("div"); top.className="top";
    const num=document.createElement("div"); num.className="num"; num.textContent=(i+1);
    const head=document.createElement("div"); head.className="head";
    const row1=document.createElement("div"); row1.className="row1";
    const h=document.createElement("h3"); h.textContent=st[0];
    const time=document.createElement("span"); time.className="time"; time.textContent=fmt((TIMINGS[lang]||[])[i]);
    row1.appendChild(h); row1.appendChild(time);
    const todo=document.createElement("div"); todo.className="todo"; todo.textContent=st[1];
    head.appendChild(row1); head.appendChild(todo);
    top.appendChild(num); top.appendChild(head);

    const audioWrap=document.createElement("div"); audioWrap.className="audio";
    const src = uploaded[lang][i] || AUDIO[lang][i] || "";
    if(src){
      const a=document.createElement("audio");
      a.controls=true; a.preload="none"; a.src=src;
      audioWrap.appendChild(a);
    }else{
      const na=document.createElement("div"); na.className="noaudio";
      const txt=document.createElement("span"); txt.textContent=d.noaudio;
      const btn=document.createElement("button"); btn.className="upload"; btn.textContent=d.upload;
      const inp=document.createElement("input"); inp.type="file"; inp.accept="audio/*"; inp.style.display="none";
      btn.onclick=()=>inp.click();
      inp.onchange=e=>{
        const f=e.target.files[0];
        if(f){ uploaded[lang][i]=URL.createObjectURL(f); render(); }
      };
      na.appendChild(txt); na.appendChild(btn); na.appendChild(inp);
      audioWrap.appendChild(na);
    }

    card.appendChild(top); card.appendChild(audioWrap);
    sc.appendChild(card);
  });
}

render();
</script>
</body>
</html>
